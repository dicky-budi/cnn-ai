# Cloudflare config for the ANN site.
# Used by `wrangler` (Cloudflare's CLI) for local dev and to declare the
# D1 database binding that the Pages Functions in /functions read from.
#
# NOTE: For the PRODUCTION site, the reliable place to set the binding is the
# Cloudflare dashboard (Settings -> Functions -> D1 database bindings),
# using the SAME variable name "DB". This file mainly helps local dev
# (`npx wrangler pages dev .`) and documents the intended setup.

name = "cnn-ai"
compatibility_date = "2026-06-01"
pages_build_output_dir = "."

# The binding name "DB" is how the code reaches the database: env.DB
[[d1_databases]]
binding = "DB"
database_name = "cnn-ai-db"
database_id = "0dccb9ca-1fcc-4a0e-b897-39612848f3b0"   # paste from: npx wrangler d1 create cnn-ai-db
